# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
#  Shell scripts live in: infra/scripts/
#  Terraform lives in:    infra/terraform/
#
# ── REQUIRED GITHUB SECRETS ─────────────────────────────────────
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# ── REQUIRED GITHUB VARIABLES (Settings → Variables) ────────────
#   AWS_REGION          e.g. us-east-1
#   AWS_ACCOUNT_ID      e.g. 123456789012
#   ECR_REPOSITORY      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/aspnet-api-production
#   ECS_CLUSTER         e.g. aspnet-api-production
#   BLUE_SERVICE        e.g. aspnet-api-production-blue
#   GREEN_SERVICE       e.g. aspnet-api-production-green
#   BLUE_TG_ARN         arn:aws:elasticloadbalancing:...
#   GREEN_TG_ARN        arn:aws:elasticloadbalancing:...
#   ALB_LISTENER_ARN    arn:aws:elasticloadbalancing:...
#   TEST_LISTENER_ARN   arn:aws:elasticloadbalancing:...
#   ALB_DNS_NAME        e.g. aspnet-api-production-alb-123.us-east-1.elb.amazonaws.com
#   ALB_ARN_SUFFIX      e.g. app/aspnet-api-production-alb/abc123  (from terraform output)
#   DESIRED_COUNT       e.g. 2
# ══════════════════════
# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
# ═══════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════
# .github/workflows/blue-green-deploy.yml
# FIXED: Blue/Green deployment with proper service selection
# ═══════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════
# .github/workflows/blue-green-deploy.yml
# FIXED: Stable Blue/Green ECS deployment pipeline
# ═══════════════════════════════════════════════════════════════════

name: 🚀 Blue/Green Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.run_number }}
  AWS_REGION: ${{ vars.AWS_REGION }}

permissions:
  contents: read


jobs:

# ─────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - run: dotnet restore
    - run: dotnet build --no-restore -c Release
    - run: dotnet test --no-build -c Release


# ─────────────────────────────────────────
# DOCKER BUILD + PUSH
# ─────────────────────────────────────────
  docker-push:
    runs-on: ubuntu-latest
    needs: build-test

    outputs:
      image-uri: ${{ steps.out.outputs.image-uri }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push Docker Image
      env:
        ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      run: |
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REPOSITORY:$IMAGE_TAG

    - id: out
      run: echo "image-uri=${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT


# ─────────────────────────────────────────
# DEPLOY (BLUE/GREEN CORE)
# ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-push

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    # ─────────────────────────────────────────
    # EXPORT REQUIRED VARIABLES
    # ─────────────────────────────────────────
    - name: Load environment variables
      run: |
        echo "ALB_LISTENER_ARN=${{ vars.ALB_LISTENER_ARN }}" >> $GITHUB_ENV
        echo "BLUE_TG_ARN=${{ vars.BLUE_TG_ARN }}" >> $GITHUB_ENV
        echo "GREEN_TG_ARN=${{ vars.GREEN_TG_ARN }}" >> $GITHUB_ENV
        echo "BLUE_SERVICE=${{ vars.BLUE_SERVICE }}" >> $GITHUB_ENV
        echo "GREEN_SERVICE=${{ vars.GREEN_SERVICE }}" >> $GITHUB_ENV
        echo "ECS_CLUSTER=${{ vars.ECS_CLUSTER }}" >> $GITHUB_ENV
        echo "ALB_DNS_NAME=${{ vars.ALB_DNS_NAME }}" >> $GITHUB_ENV
        echo "DESIRED_COUNT=${{ vars.DESIRED_COUNT }}" >> $GITHUB_ENV


    # ─────────────────────────────────────────
    # SLOT DETECTION
    # ─────────────────────────────────────────
    - name: Detect slot
      run: bash infra/scripts/detect_slot.sh


    # ─────────────────────────────────────────
    # SET DEPLOY SERVICE (FIXED BLUE/GREEN SWITCH)
    # ─────────────────────────────────────────
    - name: Decide deploy service
      run: |
        if [ "$ACTIVE_SLOT" = "blue" ]; then
          echo "DEPLOY_SERVICE=$GREEN_SERVICE" >> $GITHUB_ENV
          echo "TARGET_SLOT=green" >> $GITHUB_ENV
        else
          echo "DEPLOY_SERVICE=$BLUE_SERVICE" >> $GITHUB_ENV
          echo "TARGET_SLOT=blue" >> $GITHUB_ENV
        fi


    # ─────────────────────────────────────────
    # REGISTER TASK (FIXED - EXPORT TASK_DEF_ARN)
    # ─────────────────────────────────────────
    - name: Register task
      env:
        IMAGE_URI: ${{ needs.docker-push.outputs.image-uri }}
      run: |
        bash infra/scripts/register_task.sh

        # IMPORTANT: ensure task definition is exported
        echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV


    # ─────────────────────────────────────────
    # SCALE UP (FIXED - NO UNBOUND VARIABLE)
    # ─────────────────────────────────────────
    - name: Scale up
      env:
        TASK_DEF_ARN: ${{ env.TASK_DEF_ARN }}
        DESIRED_COUNT: ${{ vars.DESIRED_COUNT }}
        DEPLOY_SERVICE: ${{ env.DEPLOY_SERVICE }}
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      run: bash infra/scripts/scale_up.sh


    # ─────────────────────────────────────────
    # HEALTH CHECK
    # ─────────────────────────────────────────
    - name: Smoke test
      run: bash infra/scripts/smoke_test.sh


    # ─────────────────────────────────────────
    # SWITCH TRAFFIC
    # ─────────────────────────────────────────
    - name: Switch traffic
      run: bash infra/scripts/switch_traffic.sh


    # ─────────────────────────────────────────
    # SCALE DOWN OLD VERSION
    # ─────────────────────────────────────────
    - name: Scale down old
      run: bash infra/scripts/scale_down.sh


# ─────────────────────────────────────────
# MONITOR
# ─────────────────────────────────────────
  monitor:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Burn-in monitoring
      run: bash infra/scripts/monitor_burnin.sh