# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
#  Shell scripts live in: infra/scripts/
#  Terraform lives in:    infra/terraform/
#
# ── REQUIRED GITHUB SECRETS ─────────────────────────────────────
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# ── REQUIRED GITHUB VARIABLES (Settings → Variables) ────────────
#   AWS_REGION          e.g. us-east-1
#   AWS_ACCOUNT_ID      e.g. 123456789012
#   ECR_REPOSITORY      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/aspnet-api-production
#   ECS_CLUSTER         e.g. aspnet-api-production
#   BLUE_SERVICE        e.g. aspnet-api-production-blue
#   GREEN_SERVICE       e.g. aspnet-api-production-green
#   BLUE_TG_ARN         arn:aws:elasticloadbalancing:...
#   GREEN_TG_ARN        arn:aws:elasticloadbalancing:...
#   ALB_LISTENER_ARN    arn:aws:elasticloadbalancing:...
#   TEST_LISTENER_ARN   arn:aws:elasticloadbalancing:...
#   ALB_DNS_NAME        e.g. aspnet-api-production-alb-123.us-east-1.elb.amazonaws.com
#   ALB_ARN_SUFFIX      e.g. app/aspnet-api-production-alb/abc123  (from terraform output)
#   DESIRED_COUNT       e.g. 2
# ══════════════════════
name: 🚀 Blue/Green Deploy (Fixed)

on:
  push:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.run_number }}
  AWS_REGION: ${{ vars.AWS_REGION }}

permissions:
  contents: read

jobs:

# ─────────────────────────────────────────
# BUILD + TEST
# ─────────────────────────────────────────
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - run: dotnet restore
    - run: dotnet build --no-restore -c Release
    - run: dotnet test --no-build -c Release


# ─────────────────────────────────────────
# DOCKER BUILD + PUSH
# ─────────────────────────────────────────
  docker-push:
    runs-on: ubuntu-latest
    needs: build-test

    outputs:
      image-uri: ${{ steps.out.outputs.image-uri }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Login ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push Docker Image
      run: |
        docker build -t ${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG .
        docker push ${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG

    - id: out
      run: echo "image-uri=${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT


# ─────────────────────────────────────────
# DEPLOY (FIXED ORDER)
# ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-push

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    # ───── DEBUG
    - name: Debug
      run: |
        echo "Cluster: ${{ vars.ECS_CLUSTER }}"
        echo "Blue: ${{ vars.BLUE_SERVICE }}"
        echo "Green: ${{ vars.GREEN_SERVICE }}"

    # ───── DETECT SLOT
    - name: Detect slot
      run: bash infra/scripts/detect_slot.sh

    # ───── REGISTER TASK (IMPORTANT FIXED FIRST STEP)
    - name: Register new task definition
      env:
        IMAGE_URI: ${{ needs.docker-push.outputs.image-uri }}
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      run: bash infra/scripts/register_task.sh

    # ─────────────────────────────────────
    # 🔥 FIX #1 — WAIT BEFORE SCALE UP
    # ─────────────────────────────────────
    - name: Wait for ECS stabilization
      run: sleep 30

    # ───── SCALE UP (NOW SAFE)
    - name: Scale up new service
      env:
        DESIRED_COUNT: ${{ vars.DESIRED_COUNT }}
      run: bash infra/scripts/scale_up.sh

    # ─────────────────────────────────────
    # 🔥 FIX #2 — HEALTH CHECK GATE
    # ─────────────────────────────────────
    - name: Smoke test
      env:
        ALB_DNS_NAME: ${{ vars.ALB_DNS_NAME }}
      run: |
        bash infra/scripts/smoke_test.sh

    # ───── FAIL FAST IF HEALTH FAILS
    - name: Validate deployment
      run: bash infra/scripts/validate_and_rollback.sh

    # ───── TRAFFIC SWITCH (ONLY IF HEALTH OK)
    - name: Switch traffic
      run: bash infra/scripts/switch_traffic.sh

    # ───── SCALE DOWN OLD
    - name: Scale down old service
      run: bash infra/scripts/scale_down.sh


# ─────────────────────────────────────────
# MONITORING
# ─────────────────────────────────────────
  monitor:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Burn-in monitoring
      run: bash infra/scripts/monitor_burnin.sh