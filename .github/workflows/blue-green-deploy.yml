# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
#  Shell scripts live in: infra/scripts/
#  Terraform lives in:    infra/terraform/
#
# ── REQUIRED GITHUB SECRETS ─────────────────────────────────────
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# ── REQUIRED GITHUB VARIABLES (Settings → Variables) ────────────
#   AWS_REGION          e.g. us-east-1
#   AWS_ACCOUNT_ID      e.g. 123456789012
#   ECR_REPOSITORY      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/aspnet-api-production
#   ECS_CLUSTER         e.g. aspnet-api-production
#   BLUE_SERVICE        e.g. aspnet-api-production-blue
#   GREEN_SERVICE       e.g. aspnet-api-production-green
#   BLUE_TG_ARN         arn:aws:elasticloadbalancing:...
#   GREEN_TG_ARN        arn:aws:elasticloadbalancing:...
#   ALB_LISTENER_ARN    arn:aws:elasticloadbalancing:...
#   TEST_LISTENER_ARN   arn:aws:elasticloadbalancing:...
#   ALB_DNS_NAME        e.g. aspnet-api-production-alb-123.us-east-1.elb.amazonaws.com
#   ALB_ARN_SUFFIX      e.g. app/aspnet-api-production-alb/abc123  (from terraform output)
#   DESIRED_COUNT       e.g. 2
# ═══════════════════════════════════════════════════════════════════
name: 🚀 Blue/Green Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.run_number }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

permissions:
  contents: read

jobs:

# ---------------- BUILD ----------------
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    - run: dotnet restore
    - run: dotnet build --no-restore -c Release
    - run: dotnet test --no-build -c Release


# ---------------- DOCKER ----------------
  docker-push:
    runs-on: ubuntu-latest
    needs: build-test

    outputs:
      image-uri: ${{ steps.out.outputs.image-uri }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & push image
      run: |
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REPOSITORY:$IMAGE_TAG

    - name: Output image URI
      id: out
      run: echo "image-uri=$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: docker-push

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 🔍 DEBUG STEP (CONFIRMS VARIABLE IS LOADED)
    - name: Debug ALB variable
      run: |
        echo "ALB_LISTENER_ARN = '${{ vars.ALB_LISTENER_ARN }}'"

    # 🔥 FIXED DETECT SLOT STEP
    - name: Detect slot
      env:
        ALB_LISTENER_ARN: ${{ vars.ALB_LISTENER_ARN }}
        BLUE_TG_ARN: ${{ vars.BLUE_TG_ARN }}
        GREEN_TG_ARN: ${{ vars.GREEN_TG_ARN }}
        BLUE_SERVICE: ${{ vars.BLUE_SERVICE }}
        GREEN_SERVICE: ${{ vars.GREEN_SERVICE }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: |
        echo "DEBUG ALB_LISTENER_ARN=$ALB_LISTENER_ARN"
        bash infra/scripts/detect_slot.sh

    - name: Register task
      env:
        IMAGE_URI: ${{ needs.docker-push.outputs.image-uri }}
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/register_task.sh

    - name: Scale up
      env:
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        DESIRED_COUNT: ${{ vars.DESIRED_COUNT }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/scale_up.sh

    - name: Health check
      env:
        ALB_DNS_NAME: ${{ vars.ALB_DNS_NAME }}
      run: bash infra/scripts/health_check.sh

    - name: Switch traffic
      env:
        ALB_LISTENER_ARN: ${{ vars.ALB_LISTENER_ARN }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/switch_traffic.sh

    - name: Validate rollback
      env:
        ALB_DNS_NAME: ${{ vars.ALB_DNS_NAME }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/validate_and_rollback.sh

    - name: Scale down old
      if: success()
      env:
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/scale_down.sh


# ---------------- MONITOR ----------------
  monitor:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - run: bash infra/scripts/monitor_burnin.sh


# ---------------- ROLLBACK ----------------
  rollback:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - run: bash infra/scripts/rollback.sh