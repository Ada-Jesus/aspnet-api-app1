name: 🚀 Blue/Green Deploy (Stable)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.run_number }}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

# ───────────────────────── BUILD & PUSH ─────────────────────────
  build:
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.set.outputs.image-uri }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push Docker image
      run: |
        IMAGE="${{ vars.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
        docker build -t $IMAGE .
        docker push $IMAGE

    - name: Set output
      id: set
      run: echo "image-uri=${{ vars.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT


# ───────────────────────── DEPLOY ─────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Make scripts executable
      run: chmod +x infra/scripts/*.sh

    # 1. Detect slot
    - name: Detect slot
      id: slot
      env:
        ALB_LISTENER_ARN: ${{ vars.ALB_LISTENER_ARN }}
        BLUE_TG_ARN: ${{ vars.BLUE_TG_ARN }}
        GREEN_TG_ARN: ${{ vars.GREEN_TG_ARN }}
        BLUE_SERVICE: ${{ vars.BLUE_SERVICE }}
        GREEN_SERVICE: ${{ vars.GREEN_SERVICE }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/detect-slot.sh

    # 2. Register task definition
    - name: Register task definition
      id: task
      env:
        IMAGE_URI: ${{ needs.build.outputs.image-uri }}
        DEPLOY_SERVICE: ${{ steps.slot.outputs.deploy_service }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/register-task.sh

    # 3. Deploy ECS
    - name: Deploy ECS service
      env:
        ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        DEPLOY_SERVICE: ${{ steps.slot.outputs.deploy_service }}
        TASK_DEF_ARN: ${{ steps.task.outputs.task_def_arn }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/deploy.sh

    # 4. Health check (FIXED NAME)
    - name: Health check
      env:
        ALB_DNS_NAME: ${{ vars.ALB_DNS_NAME }}
      run: bash infra/scripts/health_check.sh

    # 5. Switch traffic
    - name: Switch traffic
      env:
        ALB_LISTENER_ARN: ${{ vars.ALB_LISTENER_ARN }}
        DEPLOY_TG_ARN: ${{ steps.slot.outputs.deploy_tg }}
        AWS_REGION: ${{ vars.AWS_REGION }}
      run: bash infra/scripts/switch_traffic.sh