# ═══════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════
# .github/workflows/blue-green-deploy.yml
# FIXED: Stable Blue/Green ECS deployment pipeline

name: 🚀 ASP.NET API CI/CD - Stable Blue/Green

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: aspnet-api-production
  ECS_CLUSTER: aspnet-api-production
  BLUE_SERVICE: aspnet-api-production-blue
  GREEN_SERVICE: aspnet-api-production-green

jobs:

# ───────────────────────── BUILD ─────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.x"

    - run: dotnet restore
    - run: dotnet build -c Release --no-restore
    - run: dotnet test -c Release --no-build


# ───────────────────────── DOCKER ─────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build

    # ✅ FIX: this is REQUIRED so deploy can access IMAGE
    outputs:
      image: ${{ steps.out.outputs.image }}

    steps:
    - uses: actions/checkout@v4

    - uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - uses: aws-actions/amazon-ecr-login@v2

    - name: Build image
      run: |
        docker build -t $ECR_REPOSITORY:${{ github.run_number }} .

    - name: Push image
      id: out
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/$ECR_REPOSITORY:${{ github.run_number }}

        docker tag $ECR_REPOSITORY:${{ github.run_number }} $IMAGE_URI
        docker push $IMAGE_URI

        echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT


# ───────────────────────── DEPLOY ─────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
    - uses: actions/checkout@v4

    - uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ───────── SLOT DETECTION ─────────
    - name: Detect slot
      id: slot
      run: |
        BLUE_COUNT=$(aws ecs describe-services \
          --cluster $ECS_CLUSTER \
          --services $BLUE_SERVICE \
          --query "services[0].desiredCount" \
          --output text)

        if [ "$BLUE_COUNT" -gt 0 ]; then
          echo "deploy=$GREEN_SERVICE" >> $GITHUB_OUTPUT
          echo "live=$BLUE_SERVICE" >> $GITHUB_OUTPUT
        else
          echo "deploy=$BLUE_SERVICE" >> $GITHUB_OUTPUT
          echo "live=$GREEN_SERVICE" >> $GITHUB_OUTPUT
        fi

    # ───────── DEPLOY ─────────
    - name: Deploy to ECS
      run: bash infra/scripts/deploy.sh
      env:
        AWS_REGION: ${{ env.AWS_REGION }}
        ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
        BLUE_SERVICE: ${{ env.BLUE_SERVICE }}
        GREEN_SERVICE: ${{ env.GREEN_SERVICE }}

        # ✅ THIS IS THE FIX YOU WERE MISSING
        IMAGE_URI: ${{ needs.docker.outputs.image }}

        ALB_DNS_NAME: ${{ steps.alb.outputs.dns }}
        ALB_LISTENER_ARN: ${{ steps.alb.outputs.listener }}
        DEPLOY_TG_ARN: ${{ steps.alb.outputs.tg }}