# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
#  Shell scripts live in: infra/scripts/
#  Terraform lives in:    infra/terraform/
#
# ── REQUIRED GITHUB SECRETS ─────────────────────────────────────
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# ── REQUIRED GITHUB VARIABLES (Settings → Variables) ────────────
#   AWS_REGION          e.g. us-east-1
#   AWS_ACCOUNT_ID      e.g. 123456789012
#   ECR_REPOSITORY      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/aspnet-api-production
#   ECS_CLUSTER         e.g. aspnet-api-production
#   BLUE_SERVICE        e.g. aspnet-api-production-blue
#   GREEN_SERVICE       e.g. aspnet-api-production-green
#   BLUE_TG_ARN         arn:aws:elasticloadbalancing:...
#   GREEN_TG_ARN        arn:aws:elasticloadbalancing:...
#   ALB_LISTENER_ARN    arn:aws:elasticloadbalancing:...
#   TEST_LISTENER_ARN   arn:aws:elasticloadbalancing:...
#   ALB_DNS_NAME        e.g. aspnet-api-production-alb-123.us-east-1.elb.amazonaws.com
#   ALB_ARN_SUFFIX      e.g. app/aspnet-api-production-alb/abc123  (from terraform output)
#   DESIRED_COUNT       e.g. 2
# ══════════════════════
# ═══════════════════════════════════════════════════════════════════
#  .github/workflows/blue-green-deploy.yml
#  Zero-Downtime Blue/Green – ASP.NET Core 8 → ECR → ECS Fargate
# ═══════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════
# .github/workflows/blue-green-deploy.yml
# FIXED: Blue/Green deployment with proper service selection
# ═══════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════
# .github/workflows/blue-green-deploy.yml
# FIXED: Stable Blue/Green ECS deployment pipeline
# ═══════
name: 🚀 ASP.NET API CI/CD - Stable Blue/Green

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: aspnet-api-production
  ECS_CLUSTER: aspnet-api-production
  BLUE_SERVICE: aspnet-api-production-blue
  GREEN_SERVICE: aspnet-api-production-green

jobs:

# ───────────────────────── BUILD ─────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - run: dotnet test -c Release --no-build


# ───────────────────────── DOCKER ─────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build

    outputs:
      image: ${{ steps.out.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.run_number }} .

      - name: Tag + Push
        id: out
        run: |
          IMAGE_URI=${{ steps.login.outputs.registry }}/$ECR_REPOSITORY:${{ github.run_number }}

          docker tag $ECR_REPOSITORY:${{ github.run_number }} $IMAGE_URI
          docker push $IMAGE_URI

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT


# ───────────────────────── DEPLOY ─────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ───────── FIXED SLOT DETECTION (STABLE) ─────────
      - name: Detect slot (stable)
        id: slot
        run: |
          BLUE=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $BLUE_SERVICE \
            --query "services[0].desiredCount" \
            --output text)

          GREEN=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $GREEN_SERVICE \
            --query "services[0].desiredCount" \
            --output text)

          echo "Blue: $BLUE | Green: $GREEN"

          if [ "$BLUE" -gt 0 ]; then
            echo "deploy=$GREEN_SERVICE" >> $GITHUB_OUTPUT
          else
            echo "deploy=$BLUE_SERVICE" >> $GITHUB_OUTPUT
          fi

      # ───────── DEPLOY TASK (FIXED) ─────────
      - name: Deploy ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service ${{ steps.slot.outputs.deploy }} \
            --force-new-deployment \
            --region $AWS_REGION